corine:
  raster_path: "data/corine/U2018_CLC2018_V2020_20u1.tif"

  # Which CORINE Level-3 class codes you consider PV-suitable.
  # Start conservative (mostly agriculture + grassland).
  # Codes are standard CORINE nomenclature values (e.g., 211 = non-irrigated arable land). [3](https://land.copernicus.eu/content/corine-land-cover-nomenclature-guidelines/html/)[4](https://www.statistiques.developpement-durable.gouv.fr/media/2458/download?inline)
  allowed_codes: [ 211, 212, 213, 231, 241, 242, 243, 244, 321, 333 ]

land:
  available_land_csv: "outputs/available_land_by_nuts3.csv"

features:
  cloud_csv: "data/features/cloud_by_county.csv"
  albedo_csv: "data/features/albedo_by_county.csv"

surrogate:
  enabled: true
  model_path: "models/surrogate.pkl"
  mode: "correction_factor"   # or "direct"
  fallback_correction: 1.0    # if model/features missing

features_build:
  cloud_tif_dir: "data/modis_cloud_tif"
  albedo_tif_dir: "data/ltdr_albedo_tif"
  years: [2022, 2023, 2024, 2025]


surrogate_teacher:
  enabled: true
  k_points_per_county: 6
  seed: 42
  out_training_csv: "outputs/pvgis_teacher_training.csv"
  out_county_targets_csv: "outputs/pvgis_county_mean_targets.csv"
  model_out: "models/pvgis_surrogate.joblib"
  mode: "factor"
  min_points_ok: 3

