debug: false

project:
  country: "RO"
  nuts_level: 3
  nuts_gpkg_path: "data/nuts3_ro.gpkg"
  nuts_layer: null
  crs_area_distance: "EPSG:3035"    # good for meters-based distance calculations

run:
  top_n: 8
  extra_nn: 6
  output_csv: "outputs/ranked_counties.csv"
  output_json: "outputs/ranked_counties.json"
  cache_dir: ".cache"
  pvgis_cache_file: "pvgis_cache.json"
  request_sleep_s: 0.08

xpv:
  requested_area_ha: 60   # XPV in hectares, must be 2..100

pv_model:
  provider: "PVGIS"
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"   # PVGIS v5.3 API base format [1](https://en.wikipedia.org/wiki/NUTS_statistical_regions_of_Romania)
  on_fail: "fallback"        # "fallback" or "skip"
  fallback_Ey_kWh_per_kWp: 1300
  system:
    loss_percent: 14
    tilt_deg: 35
    azimuth_deg: 0
    pvtechchoice: "crystSi"
    mountingplace: "free"
  series:
    enabled: true
    startyear: 2020
    endyear: 2025
    components: 0
    usehorizon: 1
    prefer_seriescalc_annual: true

panel:
  p_stc_kwp: 0.45
  length_m: 2.10
  width_m: 1.05
  ground_coverage_ratio: 0.45

constraints:
  land_fit_required: true
  grid:
    require_grid: true
    nearest_substation_max_km: 15
    min_substations_within_radius: 3
    radius_km: 25

grid_proxy:
  substations_geojson: null
  substations_glob: "data/earth_data/out/*substation*.geojson"

